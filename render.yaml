services:
  - type: web
    name: jarvis-web
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: JARVIS_CLOUD_PROVIDER
        value: auto
      - key: JARVIS_GROQ_MODEL
        value: openai/gpt-oss-120b
      - key: GROQ_API_KEY
        sync: false
