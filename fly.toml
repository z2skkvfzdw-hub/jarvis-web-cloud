app = "jarvis-web-cloud"
primary_region = "syd"

[build]
  dockerfile = "Dockerfile"

[env]
  PORT = "8080"
  JARVIS_CLOUD_PROVIDER = "auto"
  JARVIS_GROQ_MODEL = "openai/gpt-oss-120b"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory = "1gb"
